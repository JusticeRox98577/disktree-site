<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#1E1E2E"/>

  <!-- Hard drive body -->
  <rect x="5" y="9" width="22" height="14" rx="3" fill="#313244"/>

  <!-- Drive platter circle -->
  <circle cx="16" cy="16" r="5" fill="none" stroke="#89B4FA" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="1.8" fill="#89B4FA"/>

  <!-- Read arm -->
  <line x1="19.5" y1="12.5" x2="23" y2="10.5" stroke="#CBA6F7" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Drive connector notches -->
  <rect x="8"  y="19.5" width="2.5" height="1.5" rx="0.5" fill="#585B70"/>
  <rect x="12" y="19.5" width="2.5" height="1.5" rx="0.5" fill="#585B70"/>
  <rect x="16" y="19.5" width="2.5" height="1.5" rx="0.5" fill="#585B70"/>

  <!-- Activity LED -->
  <circle cx="24" cy="11.5" r="1.2" fill="#A6E3A1"/>
</svg>
